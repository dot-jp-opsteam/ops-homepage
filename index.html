<!DOCTYPE html>
<!-- ↑ 「これはHTML5の文書です」という“おまじない”。全HTMLの1行目に必ず書く -->
<html lang="ja">
<head>
  <!-- charset：文字化け防止。日本語サイトでは必須 -->
  <meta charset="UTF-8" />
  <!-- viewport：スマホで見たとき正しい幅で表示するための設定 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- title：ブラウザのタブに出る文字 -->
  <title>OPSチーム ホームページ</title>

  <!-- CSS（見た目）。今回は学習用に同じファイル内にまとめて書いています -->
  <style>
    body {
      font-family: sans-serif;       /* 文字の種類（ゴシック系） */
      max-width: 640px;              /* 横幅が広がりすぎないように */
      margin: 40px auto;             /* 上下40px・左右は自動＝中央寄せ */
      padding: 0 16px;
      line-height: 1.7;
      color: #222;
    }
    h1 { font-size: 1.6rem; }
    .lead { color: #666; }           /* 見出し下の説明文を少し薄い色に */

    /* リンクを縦に並べた一覧 */
    .menu { list-style: none; padding: 0; }   /* 行頭の「・」を消す */
    .menu li { margin: 12px 0; }
    .menu a {
      display: block;                /* リンク全体をクリックできる四角にする */
      padding: 16px 20px;
      border: 1px solid #ddd;
      border-radius: 12px;
      text-decoration: none;         /* リンクの下線を消す */
      color: #1565c0;
      font-weight: bold;
    }
    .menu a:hover { background: #f5f8ff; }  /* マウスを乗せたら薄く色がつく */
  </style>
</head>
<body>

  <h1>OPSチーム ホームページ</h1>
  <p class="lead">見たいページを選んでください。</p>

  <ul class="menu">

    </li>

    <!-- 意見箱 → 行き先： contact.html -->

</body>
</html>
